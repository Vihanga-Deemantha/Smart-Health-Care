apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: smart-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: smart-health-care-appointment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5027
          env:
            - name: PORT
              value: "5027"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NODE_ENV
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CLIENT_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: APPOINTMENT_MONGODB_URI
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: AUTH_SERVICE_URL
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: PATIENT_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: DOCTOR_SERVICE_URL
            - name: TELEMEDICINE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: TELEMEDICINE_SERVICE_URL
            - name: ROOM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: ROOM_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NOTIFICATION_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: PAYMENT_SERVICE_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_EXCHANGE
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: REDIS_URL
            - name: SLOT_HOLD_TTL_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: SLOT_HOLD_TTL_MINUTES
            - name: MAX_ACTIVE_HOLDS_PER_PATIENT
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: MAX_ACTIVE_HOLDS_PER_PATIENT
            - name: CANCELLATION_CUTOFF_HOURS
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CANCELLATION_CUTOFF_HOURS
            - name: REMINDER_24H_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: REMINDER_24H_ENABLED
            - name: REMINDER_1H_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: REMINDER_1H_ENABLED
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: GOOGLE_REDIRECT_URI
            - name: GOOGLE_CALENDAR_ID
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: GOOGLE_CALENDAR_ID
            - name: SWAGGER_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: SWAGGER_SERVER_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: JWT_ACCESS_SECRET
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: GOOGLE_ENCRYPTION_KEY
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_SMS_FROM
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_SMS_FROM
            - name: TWILIO_WHATSAPP_FROM
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_WHATSAPP_FROM
          readinessProbe:
            httpGet:
              path: /health
              port: 5027
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5027
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: smart-health
spec:
  selector:
    app: appointment-service
  ports:
    - port: 5027
      targetPort: 5027
