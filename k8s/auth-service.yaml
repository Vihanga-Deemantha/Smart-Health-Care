apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smart-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: smart-health-care-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5024
          env:
            - name: PORT
              value: "5024"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NODE_ENV
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CLIENT_URL
            - name: COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: COOKIE_SECURE
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: AUTH_MONGODB_URI
            - name: JWT_ACCESS_EXPIRES
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: JWT_ACCESS_EXPIRES
            - name: JWT_REFRESH_EXPIRES
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: JWT_REFRESH_EXPIRES
            - name: OTP_RESEND_COOLDOWN_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: OTP_RESEND_COOLDOWN_SECONDS
            - name: OTP_RATE_LIMIT_WINDOW_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: OTP_RATE_LIMIT_WINDOW_MINUTES
            - name: OTP_RATE_LIMIT_MAX
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: OTP_RATE_LIMIT_MAX
            - name: OTP_MAX_VERIFY_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: OTP_MAX_VERIFY_ATTEMPTS
            - name: OTP_ATTEMPT_BLOCK_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: OTP_ATTEMPT_BLOCK_MINUTES
            - name: EMAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: EMAIL_HOST
            - name: EMAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: EMAIL_PORT
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_EXCHANGE
            - name: CLOUDINARY_DOCTOR_DOCUMENTS_FOLDER
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CLOUDINARY_DOCTOR_DOCUMENTS_FOLDER
            - name: CLOUDINARY_ADMIN_PROFILE_PHOTOS_FOLDER
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CLOUDINARY_ADMIN_PROFILE_PHOTOS_FOLDER
            - name: DOCTOR_DOCUMENT_MAX_FILE_SIZE_MB
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: DOCTOR_DOCUMENT_MAX_FILE_SIZE_MB
            - name: ADMIN_PROFILE_PHOTO_MAX_FILE_SIZE_MB
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: ADMIN_PROFILE_PHOTO_MAX_FILE_SIZE_MB
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: JWT_REFRESH_SECRET
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: EMAIL_PASS
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: EMAIL_FROM
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: CLOUDINARY_API_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 5024
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5024
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smart-health
spec:
  selector:
    app: auth-service
  ports:
    - port: 5024
      targetPort: 5024
