apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-health-ingress
  namespace: smart-health
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: smart-health.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
