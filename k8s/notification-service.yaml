apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: smart-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: smart-health-care-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5032
          env:
            - name: PORT
              value: "5032"
            - name: SERVICE_NAME
              value: notification-service
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NODE_ENV
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CLIENT_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: NOTIFICATION_MONGODB_URI
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_EXCHANGE
            - name: RABBITMQ_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_QUEUE
            - name: RABBITMQ_BINDING_KEY
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_BINDING_KEY
            - name: RABBITMQ_RETRY_MS
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_RETRY_MS
            - name: EMAIL_HOST
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: EMAIL_HOST
            - name: EMAIL_PORT
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: EMAIL_PORT
            - name: NOTIFY_LK_API_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NOTIFY_LK_API_URL
            - name: NOTIFY_LK_SENDER_ID
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NOTIFY_LK_SENDER_ID
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: JWT_ACCESS_SECRET
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: EMAIL_PASS
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: EMAIL_FROM
            - name: NOTIFY_LK_USER_ID
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: NOTIFY_LK_USER_ID
            - name: NOTIFY_LK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: NOTIFY_LK_API_KEY
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_SMS_FROM
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_SMS_FROM
            - name: TWILIO_WHATSAPP_FROM
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TWILIO_WHATSAPP_FROM
          readinessProbe:
            httpGet:
              path: /health
              port: 5032
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5032
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: smart-health
spec:
  selector:
    app: notification-service
  ports:
    - port: 5032
      targetPort: 5032
