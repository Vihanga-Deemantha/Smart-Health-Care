apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  namespace: smart-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: smart-health-care-telemedicine-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5033
          env:
            - name: PORT
              value: "5033"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: NODE_ENV
            - name: CLIENT_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: CLIENT_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: TELEMEDICINE_MONGODB_URI
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: JWT_ACCESS_SECRET
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: smart-health-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: PATIENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: PATIENT_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: DOCTOR_SERVICE_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_URL
            - name: RABBITMQ_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_EXCHANGE
            - name: RABBITMQ_RETRY_MS
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: RABBITMQ_RETRY_MS
            - name: JITSI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: smart-health-config
                  key: JITSI_BASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 5033
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5033
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: smart-health
spec:
  selector:
    app: telemedicine-service
  ports:
    - port: 5033
      targetPort: 5033
